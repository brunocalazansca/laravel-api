services:
    # Laravel PHP-FPM
    app:
        build:
            context: ./api
            dockerfile: Dockerfile
        restart: unless-stopped
        working_dir: /var/www/
        volumes:
            - ./api:/var/www
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - laravel

    # Nginx (API)
    nginx:
        image: nginx:alpine
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - ./api:/var/www
            - ./api/docker/nginx/:/etc/nginx/conf.d/
        networks:
            - laravel

    # React SPA (Vite)
    spa:
        build:
            context: ./spa
            dockerfile: Dockerfile
        restart: unless-stopped
        ports:
            - "3000:5173"
        volumes:
            - ./spa:/var/www/spa
            - /var/www/spa/node_modules
        networks:
            - laravel

    # PostgreSQL
    db:
        image: postgres:16
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DB_DATABASE:-laravel}
            POSTGRES_USER: ${DB_USERNAME:-username}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-userpass}
        volumes:
            - ./.docker/postgres/dbdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-username} -d ${DB_DATABASE:-laravel}"]
            interval: 5s
            retries: 10
        ports:
            - "5432:5432"
        networks:
            - laravel

    # pgAdmin
    pgadmin:
        image: dpage/pgadmin4
        restart: unless-stopped
        ports:
            - "8080:80"
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@admin.com
            PGADMIN_DEFAULT_PASSWORD: ${DB_PASSWORD:-userpass}
        networks:
            - laravel

    # Redis
    redis:
        image: redis:alpine
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            retries: 5
        networks:
            - laravel

networks:
    laravel:
        driver: bridge
